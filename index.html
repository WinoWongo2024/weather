<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyJS-OS</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #desktop { 
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b') center/cover;
            height: calc(100vh - 40px); position: relative; 
        }
        #taskbar { 
            height: 40px; background: rgba(0,0,0,0.8); display: flex; align-items: center; padding: 0 10px; color: white; 
        }
        .icon { width: 60px; text-align: center; color: white; cursor: pointer; padding: 10px; }
        .window { 
            position: absolute; width: 400px; height: 300px; background: white; border-radius: 5px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; flex-direction: column;
        }
        .window-header { 
            background: #333; color: white; padding: 10px; cursor: move; 
            display: flex; justify-content: space-between; border-radius: 5px 5px 0 0;
        }
        .window-body { flex: 1; padding: 10px; overflow: auto; }
        .terminal-body { background: black; color: #0f0; font-family: monospace; height: 100%; }
        .close-btn { cursor: pointer; color: red; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openWindow('terminal')">💻<br>Terminal</div>
    <div class="icon" onclick="openWindow('files')">📁<br>Files</div>

    <div id="terminal" class="window" style="top: 50px; left: 50px;">
        <div class="window-header">
            <span>Terminal</span>
            <span class="close-btn" onclick="closeWindow('terminal')">✖</span>
        </div>
        <div class="window-body terminal-body">
            <div>Welcome to JS-OS v1.0...</div>
            <div>$ <input type="text" id="term-input" style="background:transparent; border:none; color:#0f0; outline:none;"></div>
        </div>
    </div>

    <div id="files" class="window" style="top: 100px; left: 100px;">
        <div class="window-header">
            <span>File Explorer</span>
            <span class="close-btn" onclick="closeWindow('files')">✖</span>
        </div>
        <div class="window-body">
            <ul>
                <li>📄 Documents</li>
                <li>🖼️ Photos</li>
                <li>🎵 Music</li>
            </ul>
        </div>
    </div>
</div>

<div id="taskbar">
    <strong>START</strong>
</div>

<script>
    function openWindow(id) {
        document.getElementById(id).style.display = 'flex';
        // Bring to front
        document.getElementById(id).style.zIndex = "100";
    }

    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
    }

    // Simple Drag Logic
    const windows = document.querySelectorAll('.window');
    windows.forEach(win => {
        const header = win.querySelector('.window-header');
        header.onmousedown = (e) => {
            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                win.style.left = pageX - shiftX + 'px';
                win.style.top = pageY - shiftY + 'px';
            }

            function onMouseMove(event) { moveAt(event.pageX, event.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            header.onmouseup = () => {
                document.removeEventListener('mousemove', onMouseMove);
                header.onmouseup = null;
            };
        };
    });
</script>

</body>
</html>
