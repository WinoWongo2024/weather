<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CloudOS Pro - Simulator</title>
    <style>
        :root { --glass: rgba(30, 30, 30, 0.8); --accent: #0078d7; --blur: blur(15px); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920') center/cover; }
        
        /* --- BSOD --- */
        #bsod { position: fixed; inset: 0; background: #0000aa; color: white; padding: 50px; z-index: 9999; display: none; font-family: monospace; }
        #bsod h1 { font-size: 5rem; margin: 0; }

        /* --- DESKTOP & WINDOWS --- */
        #desktop { height: calc(100vh - 45px); position: relative; padding: 20px; z-index: 1; }
        .window { position: absolute; width: 400px; height: 300px; background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .win-header { padding: 10px; background: rgba(255,255,255,0.1); display: flex; justify-content: space-between; cursor: move; align-items: center; }
        .win-body { flex: 1; padding: 15px; overflow: auto; color: #eee; }
        .close-btn { background: #ff5f56; width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }

        /* --- START MENU --- */
        #start-menu { position: absolute; bottom: 50px; left: 10px; width: 250px; background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; display: none; flex-direction: column; padding: 10px; z-index: 100; }
        .start-item { padding: 10px; cursor: pointer; border-radius: 5px; color: white; }
        .start-item:hover { background: var(--accent); }

        /* --- TASKBAR --- */
        #taskbar { position: fixed; bottom: 0; width: 100%; height: 45px; background: rgba(0,0,0,0.8); backdrop-filter: var(--blur); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; box-sizing: border-box; z-index: 101; }
        #start-btn { background: var(--accent); color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* --- APPS SPECIFIC --- */
        #notepad-text { width: 100%; height: 90%; background: transparent; color: white; border: none; outline: none; resize: none; }
        .file-item { cursor: pointer; padding: 5px; display: flex; align-items: center; gap: 10px; }
        .file-item:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="bsod">
    <h1>:(</h1>
    <br><p>Your PC ran into a problem and needs to restart. We're just collecting some error info, and then we'll restart for you.</p>
    <p>Stop Code: CRITICAL_PROCESS_DIED</p>
    <p>Press any key to "reboot"...</p>
</div>

<div id="desktop" onclick="hideStart()">
    <div style="display:flex; flex-direction:column; gap:10px;">
        <button onclick="openWin('win-files')" style="background:none; border:none; color:white; cursor:pointer;">📁 Files</button>
        <button onclick="openWin('win-taskmgr')" style="background:none; border:none; color:white; cursor:pointer;">⚙️ Task Mgr</button>
    </div>

    <div id="win-notepad" class="window" style="top:100px; left:100px;">
        <div class="win-header"><span>Notepad</span><div class="close-btn" onclick="closeWin('win-notepad')"></div></div>
        <div class="win-body"><textarea id="notepad-text" placeholder="Start typing..."></textarea></div>
    </div>

    <div id="win-taskmgr" class="window" style="top:150px; left:150px;">
        <div class="win-header"><span>Task Manager</span><div class="close-btn" onclick="closeWin('win-taskmgr')"></div></div>
        <div class="win-body">
            <div id="task-list"></div>
            <hr>
            <button onclick="triggerBSOD()" style="color:red; background:none; border:1px solid red; cursor:pointer;">End System Process (Dangerous)</button>
        </div>
    </div>

    <div id="win-files" class="window" style="top:50px; left:300px;">
        <div class="win-header"><span>File Explorer</span><div class="close-btn" onclick="closeWin('win-files')"></div></div>
        <div class="win-body" id="file-list"></div>
    </div>
</div>

<div id="start-menu">
    <div class="start-item" onclick="openWin('win-notepad')">📝 Notepad</div>
    <div class="start-item" onclick="openWin('win-files')">📁 File Explorer</div>
    <div class="start-item" onclick="openWin('win-taskmgr')">⚙️ Task Manager</div>
    <div class="start-item" onclick="location.reload()">🔄 Restart</div>
</div>

<div id="taskbar">
    <button id="start-btn" onclick="toggleStart(event)">START</button>
    <div style="color:white;" id="clock">12:00</div>
</div>

<script>
    let openApps = [];

    // --- SYSTEM LOGIC ---
    function toggleStart(e) { e.stopPropagation(); const m = document.getElementById('start-menu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    function hideStart() { document.getElementById('start-menu').style.display = 'none'; }

    function openWin(id) {
        document.getElementById(id).style.display = 'flex';
        if(!openApps.includes(id)) openApps.push(id);
        updateTaskMgr();
    }

    function closeWin(id) {
        document.getElementById(id).style.display = 'none';
        openApps = openApps.filter(app => app !== id);
        updateTaskMgr();
    }

    function updateTaskMgr() {
        const list = document.getElementById('task-list');
        list.innerHTML = "<strong>Active Processes:</strong><br>";
        openApps.forEach(app => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; margin:5px 0;">
                ${app} <button onclick="closeWin('${app}')">End Task</button>
            </div>`;
        });
    }

    // --- FILE SYSTEM ---
    const files = ["User_Guide.txt", "System_Log.log", "Secrets.zip", "Budget_2026.xlsx"];
    function renderFiles() {
        const container = document.getElementById('file-list');
        container.innerHTML = files.map(f => `<div class="file-item">📄 ${f}</div>`).join('');
    }

    // --- ERRORS ---
    function triggerBSOD() {
        document.getElementById('bsod').style.display = 'block';
        window.addEventListener('keydown', () => location.reload());
    }

    // --- INITIALIZE ---
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
    renderFiles();
</script>
</body>
</html>
